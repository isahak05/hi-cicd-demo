name: Build and Push to Harbor after delete image from runner

on:
  push:
    branches:
      - main

jobs:
  docker:
    name: Build Docker Image
    runs-on: self-hosted

    env:
      REGISTRY: ${{ vars.HARBOR_URL }}
      PROJECT: ${{ vars.PROJECT }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      IMAGE_TAG: v3

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Verify Runner
        run: |
          echo "===== Runner Information ====="
          whoami
          hostname
          pwd

          echo ""
          echo "===== Docker Version ====="
          docker version

          echo ""
          echo "===== Docker Status ====="
          docker ps

      - name: Verify Configuration
        run: |
          echo "Registry  : $REGISTRY"
          echo "Project   : $PROJECT"
          echo "Image     : $IMAGE_NAME"
          echo "Tag       : $IMAGE_TAG"

      - name: Login to Harbor
        run: |
          echo '${{ secrets.HARBOR_PASSWORD }}' | docker login harbor100.waltonbd.com:8443 \
            --username '${{ secrets.HARBOR_USERNAME }}' \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t "$REGISTRY/$PROJECT/$IMAGE_NAME:$IMAGE_TAG" \
            .

      - name: List Docker Images
        run: |
          docker images | grep "$IMAGE_NAME"

      - name: Push Docker Image
        run: |
          docker push "$REGISTRY/$PROJECT/$IMAGE_NAME:$IMAGE_TAG"

      # -----------------------------------------------------------------
      # GITOPS UPDATE SECTION (Modifies your Kustomize manifest repo)
      # -----------------------------------------------------------------
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: 'isahak05/hi-cicd-gitops'
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Image Tag in Kustomize
        run: |
          cd gitops-repo/apps/hi-cicd-demo
          
          # Install kustomize temporarily if it isn't on the self-hosted runner
          if ! command -v kustomize &> /dev/null; then
            curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
            KUSTOMIZE_BIN="./kustomize"
          else
            KUSTOMIZE_BIN="kustomize"
          fi
          
          # Match the original image name structure and swap it with the new Tag
          $KUSTOMIZE_BIN edit set image "${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}=\
          ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Commit and Push Changes to GitOps Repo
        run: |
          cd gitops-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/hi-cicd-demo/kustomization.yaml
          git commit -m "Bump image tag to ${{ env.IMAGE_TAG }} [skip ci]" || exit 0
          git push origin main

      # -----------------------------------------------------------------
      # CLEANUP AND LOGOUT SECTION (Always executes)
      # -----------------------------------------------------------------
      - name: Delete Image from Runner
        if: always()
        run: |
          docker rmi "$REGISTRY/$PROJECT/$IMAGE_NAME:$IMAGE_TAG" || true

      - name: Logout from Harbor
        if: always()
        run: |
          docker logout harbor100.waltonbd.com:8443
