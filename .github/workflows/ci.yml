name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: self-hosted

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Show Runner Information
        run: |
          hostname
          whoami
          pwd
          docker version

      - name: Build Docker Image
        run: |
          docker build -t test-image:latest .

      - name: Verify Image
        run: |
          docker images
