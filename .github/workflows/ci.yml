name: Zero-Touch Automated GitOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    name: Build, Push, and Deploy
    runs-on: self-hosted

    env:
      REGISTRY: ${{ vars.HARBOR_URL }}
      PROJECT: ${{ vars.PROJECT }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      # Automatically increments (e.g., v2.0.1, v2.0.2, v2.0.3...) on every push
      IMAGE_TAG: v2.0.${{ github.run_number }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor100.waltonbd.com:8443
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Delete Image from Runner
        if: always()
        run: |
          docker rmi ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

      # -----------------------------------------------------------------
      # GITOPS UPDATE SECTION (Fully Automated)
      # -----------------------------------------------------------------
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: 'isahak05/hi-cicd-gitops'
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Image Tag in Kustomize
        run: |
          cd gitops-repo/apps/hi-cicd-demo
          
          if ! command -v kustomize &> /dev/null; then
            curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
            KUSTOMIZE_BIN="./kustomize"
          else
            KUSTOMIZE_BIN="kustomize"
          fi
          
          # This command injects the new tag directly into the manifest
          $KUSTOMIZE_BIN edit set image ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}=\
          ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Commit and Push Changes to GitOps Repo
        run: |
          cd gitops-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/hi-cicd-demo/kustomization.yaml
          git commit -m "Automated release ${{ env.IMAGE_TAG }} [skip ci]" || exit 0
          git push origin main
