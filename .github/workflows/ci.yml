name: Build and Push to Harbor

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: self-hosted

    env:
      REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
      PROJECT: demo01
      IMAGE_NAME: hi-cicd-demo
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Verify Runner
        run: |
          whoami
          hostname
          docker version
          docker ps

      - name: Verify Harbor Registry
        run: |
          echo "Registry: $REGISTRY"

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "$REGISTRY" \
            -u "${{ secrets.HARBOR_USERNAME }}" \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t "$REGISTRY/$PROJECT/$IMAGE_NAME:$TAG" .

      - name: Push Docker Image
        run: |
          docker push "$REGISTRY/$PROJECT/$IMAGE_NAME:$TAG"

      - name: Logout
        if: always()
        run: docker logout "$REGISTRY"
